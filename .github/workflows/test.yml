name: Automation Test Framework

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - web

  # Auto trigger on Pull Request
  pull_request:
    branches:
      - main
      - develop

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'api'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run API Tests
        run: ./gradlew apiTest --no-daemon

      - name: Upload API Test Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: api-test-reports
          path: build/reports/cucumber/api/

  web-tests:
    name: Run Web UI Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'web'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Web Tests (Headless)
        run: ./gradlew webTest --no-daemon
        env:
          WEB_HEADLESS: true

      - name: Upload Web Test Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: web-test-reports
          path: build/reports/cucumber/web/