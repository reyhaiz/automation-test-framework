name: Automation Test Framework

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Type of tests to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api
          - web

  push:
    branches:
      - main

  pull_request:
    branches:
      - main
      - develop

jobs:

  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'api'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run API Tests
        run: ./gradlew apiTest --no-daemon

      - name: Upload API Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: build/reports/cucumber/api/


  web-tests:
    name: Run Web UI Tests
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'web'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Web Tests (Headless)
        run: ./gradlew webTest --no-daemon
        env:
          WEB_HEADLESS: true

      - name: Upload Web Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-reports
          path: build/reports/cucumber/web/