name: Automation Test Framework CI

on:
  # ── Manual trigger ──────────────────────────────────────
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Which test suite to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - web

  # ── Auto trigger on Pull Request ────────────────────────
  pull_request:
    branches:
      - main
      - develop

# ─────────────────────────────────────────────────────────
jobs:

  # ── API Tests ───────────────────────────────────────────
  api-tests:
    name: 🔌 API Tests (@api)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_suite == 'all' ||
        github.event.inputs.test_suite == 'api'))

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔑 Make gradlew executable
        run: chmod +x gradlew

      - name: 🚀 Run API tests
        run: ./gradlew apiTest --no-daemon --info

      - name: 📊 Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: build/reports/cucumber/api/
          retention-days: 7

  # ── Web UI Tests ─────────────────────────────────────────
  web-tests:
    name: 🌐 Web UI Tests (@web)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.test_suite == 'all' ||
        github.event.inputs.test_suite == 'web'))

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🌍 Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | \
            sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -y
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: 🔑 Make gradlew executable
        run: chmod +x gradlew

      - name: 🚀 Run Web UI tests (headless)
        run: ./gradlew webTest --no-daemon --info
        env:
          WEB_HEADLESS: true

      - name: 📊 Upload Web test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-test-report
          path: build/reports/cucumber/web/
          retention-days: 7